<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475E74"/>
      <stop offset="100%" stop-color="#2E4256"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1.5" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <g filter="url(#shadow)" stroke="#9AACBB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="20" cy="20" r="14" fill="url(#body)"/>
    <rect x="14" y="14" width="12" height="12" rx="2" fill="#E05555" stroke="#9AACBB" stroke-width="1.5"/>
  </g>
</svg>
