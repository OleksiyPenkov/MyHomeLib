<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8E6F2"/>
      <stop offset="100%" stop-color="#B4C8DC"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1.5" stdDeviation="1.2" flood-color="#0a1a2e" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#shadow)" stroke="#19375F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Terminal window -->
    <rect x="6" y="8" width="28" height="24" rx="3" fill="url(#body)"/>
    <!-- Title bar -->
    <line x1="6" y1="14" x2="34" y2="14"/>
    <!-- Window buttons -->
    <circle cx="10" cy="11" r="1.2" fill="#E05555" stroke="none"/>
    <circle cx="14" cy="11" r="1.2" fill="#FFD700" stroke="none"/>
    <circle cx="18" cy="11" r="1.2" fill="#4CAF50" stroke="none"/>
    <!-- Command prompt -->
    <polyline points="10,19 14,22 10,25" stroke="#3CB4DC" stroke-width="2"/>
    <line x1="16" y1="25" x2="24" y2="25" stroke="#3CB4DC" stroke-width="1.5"/>
  </g>
</svg>
