<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8E6F2"/>
      <stop offset="100%" stop-color="#B4C8DC"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F8FB"/>
      <stop offset="100%" stop-color="#E8EEF4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1.5" stdDeviation="1.2" flood-color="#0a1a2e" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#shadow)" stroke="#19375F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Book cover -->
    <path d="M8 7 C8 7 9 6 13 6 L27 6 C31 6 32 7 32 7 L32 30 C32 30 31 31 27 31 L13 31 C9 31 8 30 8 30 Z" fill="url(#body)"/>
    <!-- Book spine -->
    <line x1="13" y1="6" x2="13" y2="31"/>
    <!-- Pages -->
    <rect x="15" y="9" width="14" height="19" rx="1" fill="url(#page)"/>
    <!-- Text lines -->
    <line x1="17" y1="13" x2="27" y2="13" stroke-width="1"/>
    <line x1="17" y1="16.5" x2="27" y2="16.5" stroke-width="1"/>
    <line x1="17" y1="20" x2="24" y2="20" stroke-width="1"/>
    <!-- Open indicator - bookmark -->
    <path d="M25 6 L25 11 L27.5 9 L30 11 L30 6" fill="#3CB4DC" stroke="#19375F" stroke-width="1"/>
  </g>
</svg>
