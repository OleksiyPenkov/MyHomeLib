<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8E6F2"/>
      <stop offset="100%" stop-color="#B4C8DC"/>
    </linearGradient>
    <linearGradient id="sec" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C0D0E2"/>
      <stop offset="100%" stop-color="#96AABE"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1.5" stdDeviation="1.2" flood-color="#0a1a2e" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#shadow)" stroke="#19375F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Floppy disk body -->
    <path d="M8 8 L8 32 L32 32 L32 12 L28 8 Z" fill="url(#body)"/>
    <!-- Top label area -->
    <rect x="12" y="8" width="14" height="10" rx="1" fill="url(#sec)"/>
    <!-- Metal slider -->
    <rect x="18" y="9" width="5" height="8" rx="0.5" fill="#3CB4DC"/>
    <!-- Bottom label -->
    <rect x="12" y="22" width="16" height="8" rx="1" fill="#fff" opacity="0.6"/>
    <line x1="14" y1="25" x2="26" y2="25" stroke-width="0.8"/>
    <line x1="14" y1="28" x2="22" y2="28" stroke-width="0.8"/>
  </g>
</svg>
