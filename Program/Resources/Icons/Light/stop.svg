<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8E6F2"/>
      <stop offset="100%" stop-color="#B4C8DC"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1.5" stdDeviation="1.2" flood-color="#0a1a2e" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#shadow)" stroke="#19375F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="20" cy="20" r="14" fill="url(#body)"/>
    <rect x="14" y="14" width="12" height="12" rx="2" fill="#E05555" stroke="#19375F" stroke-width="1.5"/>
  </g>
</svg>
