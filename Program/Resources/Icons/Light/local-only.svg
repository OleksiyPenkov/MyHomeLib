<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8E6F2"/>
      <stop offset="100%" stop-color="#B4C8DC"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1.5" stdDeviation="1.2" flood-color="#0a1a2e" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#shadow)" stroke="#19375F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Hard drive / local storage -->
    <rect x="7" y="14" width="26" height="16" rx="3" fill="url(#body)"/>
    <!-- Drive details -->
    <line x1="7" y1="24" x2="33" y2="24"/>
    <!-- LED indicator -->
    <circle cx="29" cy="28" r="2" fill="#3CB4DC" stroke="#19375F" stroke-width="1"/>
    <!-- Drive slot -->
    <line x1="11" y1="28" x2="18" y2="28" stroke-width="1.5"/>
    <!-- Pin / location marker on top -->
    <circle cx="20" cy="9" r="3.5" fill="url(#body)"/>
    <circle cx="20" cy="9" r="1.5" fill="#3CB4DC" stroke="none"/>
    <line x1="20" y1="12.5" x2="20" y2="14"/>
  </g>
</svg>
