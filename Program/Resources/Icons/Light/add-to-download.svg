    <!-- Plus badge -->
    <circle cx="31" cy="10" r="6" fill="#3CB4DC" stroke="#19375F" stroke-width="1.2"/>
    <line x1="28.5" y1="10" x2="33.5" y2="10" stroke="#fff" stroke-width="1.5"/>
    <line x1="31" y1="7.5" x2="31" y2="12.5" stroke="#fff" stroke-width="1.5"/>
  </g>
</svg>
